<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Fylo data storage component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
    body{ background: black;}
  </style>
</head>
<body>

  <div class="contenedorPadre">
    <div class="fyloContainer">
      <img src="images/logo.svg" alt="">
      <div class="opciones">
        <img src="images/icon-document.svg" alt="">
        <img src="images/icon-folder.svg" alt="">
        <img src="images/icon-upload.svg" alt="">
      </div>
    </div>
    <div class="storageContainer">
      <p>You’ve used 815 GB of your storage</p>
      <div class="barraMemoria">
        <div class="barraInterior">
          <div class="circulo"></div>
        </div> 
      </div>
      <p>0 GB</p> 
      <p>1000 GB</p>
      <div class="nubeMemoriaRestante">
        <p>185 GB Left</p>
      </div>
    </div>
  </div>
  


  
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </div>
</body>
</html>
